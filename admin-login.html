<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubigan - Admin Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-nunito bg-gradient-to-br from-gray-900 to-blue-900 min-h-screen flex items-center justify-center p-4 sm:p-6">
  <div class="w-full max-w-md">
    
    <div class="text-center mb-6 sm:mb-8">
      <div class="inline-flex items-center space-x-2">
        <div class="w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center">
          <span class="text-2xl sm:text-3xl">💧</span>
        </div>
        <span class="text-2xl sm:text-3xl font-extrabold text-white">TUBIGAN <span class="text-amber-400">ADMIN</span></span>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8">
      <h2 class="text-xl sm:text-2xl font-extrabold text-gray-900 text-center mb-6 sm:mb-8">Administrator Login</h2>
      <form id="adminLoginForm" class="space-y-4 sm:space-y-5">
        <div>
          <label class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Admin Email</label>
          <input type="email" placeholder="admin@tubigan.com" class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent text-sm sm:text-base">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-1 sm:mb-2 text-sm sm:text-base">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-2 sm:py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent text-sm sm:text-base">
        </div>
        <button type="submit" class="w-full bg-amber-500 text-white py-2 sm:py-3 rounded-lg font-bold text-base sm:text-lg hover:bg-amber-600 transition shadow-lg mt-2 sm:mt-0">Sign In as Admin</button>
      </form>
    </div>

    <p class="text-center mt-6">
      <a href="index.html" class="text-white hover:underline font-semibold text-sm sm:text-base">Back to Home</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
