<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubigan - Login / Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-nunito bg-gradient-to-br from-blue-50 to-white min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center space-x-2">
        <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center">
          <span class="text-white text-3xl">💧</span>
        </div>
        <span class="text-3xl font-extrabold text-blue-600">TUBIGAN</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="flex border-b border-gray-200 mb-8">
        <button id="loginTab" class="w-1/2 py-3 text-center font-bold text-lg text-blue-600 border-b-2 border-blue-600 transition">Login</button>
        <button id="registerTab" class="w-1/2 py-3 text-center font-bold text-lg text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
          <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition shadow-lg">Sign In</button>
      </form>

      <!-- Register Form (Hidden by default) -->
      <form id="registerForm" class="space-y-5 hidden">
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Full Name</label>
          <input type="text" placeholder="Juan Dela Cruz" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
          <input type="email" placeholder="you@example.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div>
          <label class="block text-gray-700 font-semibold mb-2">Password</label>
          <input type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit" class="w-full bg-amber-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-amber-600 transition shadow-lg">Create Account</button>
      </form>

      <p class="text-center text-gray-500 mt-6 text-sm">
        <a href="admin-login.html" class="text-blue-600 hover:underline font-semibold">Admin? Login here</a>
      </p>
    </div>

    <p class="text-center mt-6">
      <a href="index.html" class="text-blue-600 hover:underline font-semibold">Back to Home</a>
    </p>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
