<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubigan - Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-nunito bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-lg">
    <div class="text-center mb-6">
      <a href="dashboard.html" class="text-blue-600 hover:underline font-semibold">Back to Dashboard</a>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-2xl font-extrabold text-gray-900 mb-6">💳 Online Payment</h2>

      <!-- Payment Method Selection -->
      <div class="space-y-4 mb-8">
        <label class="flex items-center p-4 border-2 border-blue-600 rounded-xl cursor-pointer bg-blue-50">
          <input type="radio" name="payment" checked class="w-5 h-5 text-blue-600">
          <span class="ml-3 font-semibold text-gray-800">GCash</span>
        </label>
        <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-amber-400">
          <input type="radio" name="payment" class="w-5 h-5 text-amber-500">
          <span class="ml-3 font-semibold text-gray-800">Maya</span>
        </label>
        <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:border-amber-400">
          <input type="radio" name="payment" class="w-5 h-5 text-amber-500">
          <span class="ml-3 font-semibold text-gray-800">Bank Transfer</span>
        </label>
      </div>

      <!-- Amount Input -->
      <div class="mb-6">
        <label class="block text-gray-700 font-semibold mb-2">Amount (₱)</label>
        <input type="number" value="250" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg font-bold">
      </div>

      <!-- Reference Number -->
      <div class="mb-6 p-4 bg-amber-50 rounded-xl border border-amber-200">
        <p class="text-sm text-gray-600">Reference Number</p>
        <p class="text-2xl font-mono font-bold text-amber-600">TUB-2025-0513-001</p>
      </div>

      <button id="payButton" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition shadow-lg">
        Pay Now
      </button>
    </div>
  </div>

  <script src="js/payment.js"></script>
</body>
</html>
