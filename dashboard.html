<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tubigan - Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-nunito bg-gray-100">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-xl hidden md:block">
      <div class="p-6 border-b">
        <div class="flex items-center space-x-2">
          <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
            <span class="text-white">💧</span>
          </div>
          <span class="text-xl font-extrabold text-blue-600">TUBIGAN</span>
        </div>
      </div>
      <nav class="p-4 space-y-2">
        <a href="#" class="flex items-center space-x-3 p-3 bg-blue-50 text-blue-600 rounded-lg font-semibold">
          <span>📊</span><span>Dashboard</span>
        </a>
        <a href="payment.html" class="flex items-center space-x-3 p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
          <span>💳</span><span>Payment</span>
        </a>
        <a href="#" class="flex items-center space-x-3 p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
          <span>📦</span><span>Orders</span>
        </a>
        <a href="#" class="flex items-center space-x-3 p-3 text-gray-600 hover:bg-blue-50 hover:text-blue-600 rounded-lg transition">
          <span>👤</span><span>Profile</span>
        </a>
        <a href="index.html" class="flex items-center space-x-3 p-3 text-gray-600 hover:bg-red-50 hover:text-red-600 rounded-lg transition">
          <span>🚪</span><span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-gray-900">Welcome back, Juan!</h1>
        <p class="text-gray-600 mt-1">Here's your water consumption overview</p>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-white rounded-xl p-6 shadow-md">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Current Balance</p>
              <p class="text-3xl font-extrabold text-blue-600">₱250</p>
            </div>
            <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
              <span class="text-2xl">💰</span>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl p-6 shadow-md">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Gallons This Month</p>
              <p class="text-3xl font-extrabold text-amber-500">12</p>
            </div>
            <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center">
              <span class="text-2xl">💧</span>
            </div>
          </div>
        </div>
        <div class="bg-white rounded-xl p-6 shadow-md">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-gray-500 text-sm">Next Delivery</p>
              <p class="text-3xl font-extrabold text-green-500">Fri</p>
            </div>
            <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
              <span class="text-2xl">📅</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Recent Orders -->
      <div class="bg-white rounded-xl p-6 shadow-md">
        <h2 class="text-xl font-bold text-gray-900 mb-4">Recent Orders</h2>
        <div class="space-y-4">
          <div class="flex items-center justify-between border-b pb-4">
            <div>
              <p class="font-semibold text-gray-800">3 Gallons - Delivery</p>
              <p class="text-sm text-gray-500">May 10, 2025</p>
            </div>
            <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-semibold">Delivered</span>
          </div>
          <div class="flex items-center justify-between border-b pb-4">
            <div>
              <p class="font-semibold text-gray-800">2 Gallons - Pickup</p>
              <p class="text-sm text-gray-500">May 8, 2025</p>
            </div>
            <span class="bg-amber-100 text-amber-700 px-3 py-1 rounded-full text-sm font-semibold">Processing</span>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
